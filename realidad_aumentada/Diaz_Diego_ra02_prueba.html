<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba 3D</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>

  <a-scene>

    <!-- Fondo -->
    <a-sky color="#222"></a-sky>

    <!-- Suelo -->
    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="6"
      height="6"
      color="#555">
    </a-plane>

    <!-- Contenedor del objeto -->
    <a-entity id="modelo" position="0 0 -4">

  <!-- Poste -->
  <a-cylinder
    position="0 0.75 0"
    radius="0.05"
    height="1.5"
    color="#888">
  </a-cylinder>

  <!-- Caja del semáforo -->
  <a-box
    position="0 1.6 0"
    width="0.3"
    height="0.6"
    depth="0.2"
    color="#222">
  </a-box>

  <!-- Luz roja -->
  <a-sphere
    position="0 1.8 0.11"
    radius="0.06"
    color="red">
  </a-sphere>

  <!-- Luz amarilla -->
  <a-sphere
    position="0 1.6 0.11"
    radius="0.06"
    color="yellow">
  </a-sphere>

  <!-- Luz verde -->
  <a-sphere
    position="0 1.4 0.11"
    radius="0.06"
    color="green">
  </a-sphere>

</a-entity>
    <!-- Cámara -->
    <a-camera position="0 1.6 0"></a-camera>

  </a-scene>

</body>
</html>
